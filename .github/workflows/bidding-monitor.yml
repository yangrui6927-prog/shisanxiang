name: 招标信息监控

on:
  schedule:
    - cron: '0 0-15 * * *'  # 北京时间8点到23点每小时执行（UTC 0点到15点）
  workflow_dispatch:  # 允许手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: 恢复推送记录缓存
      uses: actions/cache@v4
      with:
        path: ~/.cache/bidding-monitor/pushed_bids.json
        key: pushed-bids-main
        restore-keys: |
          pushed-bids-

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - run: |
        pip install -r requirements.txt
        playwright install chromium

    - name: 运行招标监控
      run: python bidding_notifier.py
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        FETCH_HOURS: 25
        LOCAL_CSV_FILE: 招标订阅表.csv
        PUSHED_BIDS_CACHE: ~/.cache/bidding-monitor/pushed_bids.json

    - name: 保存推送记录到缓存
      uses: actions/cache@v4
      with:
        path: ~/.cache/bidding-monitor/pushed_bids.json
        key: pushed-bids-main
