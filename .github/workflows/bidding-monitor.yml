name: 招标信息监控

on:
  schedule:
    - cron: '5 * * * *'  # 每小时UTC 5分运行（北京时间13分）
  workflow_dispatch:  # 允许手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许写入仓库

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - run: |
        pip install -r requirements.txt
        playwright install chromium

    - name: 运行招标监控
      run: python bidding_notifier.py
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        FETCH_HOURS: 25
        LOCAL_CSV_FILE: 招标订阅表.csv

    - name: 提交推送记录到Git
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        if [ -f pushed_bids.json ]; then
          git add pushed_bids.json
          if git diff --cached --quiet; then
            echo "推送记录无变化"
          else
            git commit -m "更新推送记录 $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          fi
        else
          echo "pushed_bids.json 不存在，跳过提交"
        fi
